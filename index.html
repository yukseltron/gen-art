<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Generative Art" />
    <title>Gen Art</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: black;
        color: white;
        font-family: sans-serif;
        user-select: none;
      }

      header {
        display: flex;
        justify-content: center;
        gap: 10px;
        padding: 24px 30px;
      }

      header a {
        text-decoration: none;
        color: white;
        font-size: 0.85rem;
        font-weight: 200;
      }

      header a:hover {
        text-decoration: underline;
      }

      main {
        width: 80%;
        margin: 0 auto;
        margin-top: 80px;
        margin-bottom: 400px;
        display: flex;
        flex-direction: column;
      }

      .page-title {
        font-size: 6rem;
        font-weight: 200;
        font-style: italic;
        line-height: 1;
        margin-bottom: 80px;
        cursor: default;
      }

      .series-list {
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .series-entry {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: baseline;
        padding: 28px 0;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        text-decoration: none;
        color: white;
        cursor: pointer;
      }

      .series-entry:last-child {
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      }

      .series-name {
        font-size: 3rem;
        font-weight: 200;
        font-style: italic;
        transition: opacity 0.2s;
      }

      .series-entry:hover .series-name {
        opacity: 0.5;
      }

      .series-info {
        font-size: 0.75rem;
        font-weight: 200;
        opacity: 0.35;
        letter-spacing: 0.08em;
        text-align: right;
        line-height: 1;
      }

      @media (max-width: 640px) {
        main {
          width: 90%;
          margin-top: 50px;
        }
        .page-title {
          font-size: 3.5rem;
          margin-bottom: 50px;
        }
        .series-name {
          font-size: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/">Gen Art</a>
      <a href="https://yooksel.com/">yooksel.com</a>
    </header>

    <main>
      <h1 class="page-title" id="headline">Gen Art</h1>

      <nav class="series-list">
        <a class="series-entry" href="organic.html">
          <span class="series-name" data-label="Organic">Organic</span>
          <span class="series-info">2024 — 2026&ensp;/&ensp;18</span>
        </a>
        <a class="series-entry" href="plume.html">
          <span class="series-name" data-label="Plume">Plume</span>
          <span class="series-info">2024 — 2025&ensp;/&ensp;3</span>
        </a>
        <a class="series-entry" href="worm.html">
          <span class="series-name" data-label="Worm">Worm</span>
          <span class="series-info">2025 — 2026&ensp;/&ensp;3</span>
        </a>
      </nav>
    </main>

    <script>
      const chars = '.-:_—·';
      const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

      async function scramble(element, finalText, iterations) {
        for (let i = 0; i < iterations; i++) {
          await sleep(70);
          element.textContent = finalText
            .split('')
            .map(c => c === ' ' ? ' ' : chars[Math.floor(Math.random() * chars.length)])
            .join('');
        }
        element.textContent = finalText;
      }

      window.addEventListener('load', () => {
        scramble(document.getElementById('headline'), 'Gen Art', 18);
      });

      document.querySelectorAll('.series-name').forEach(el => {
        el.addEventListener('mouseenter', () => scramble(el, el.dataset.label, 8));
      });
    </script>
  </body>
</html>
