<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Generative Art" />
    <title>gen-art</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: black;
        color: white;
        font-family: sans-serif;
        user-select: none;
      }

      header {
        display: flex;
        justify-content: center;
        gap: 10px;
        padding: 24px 30px;
      }

      header a {
        text-decoration: none;
        color: white;
        font-size: 0.85rem;
        font-weight: 200;
      }

      header a:hover {
        text-decoration: underline;
      }

      main {
        width: 80%;
        margin: 0 auto;
        margin-top: 80px;
        margin-bottom: 400px;
      }

      .series-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 28px;
      }

      .series-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        text-decoration: none;
        color: white;
      }

      .card-preview {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        display: block;
        outline: 1px solid rgba(255, 255, 255, 0.1);
      }

      .card-title {
        font-size: 1rem;
        font-weight: 200;
        font-style: italic;
        text-align: center;
        cursor: default;
      }

      @media (max-width: 640px) {
        main {
          width: 90%;
          margin-top: 50px;
        }
        .series-grid {
          grid-template-columns: 1fr;
          gap: 14px;
        }
        .card-title {
          font-size: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/">gen-art</a>
      <a href="https://yooksel.com/">yooksel</a>
    </header>

    <main>
      <nav class="series-grid">
        <a class="series-card" href="worm.html">
          <video class="card-preview" muted loop autoplay playsinline></video>
          <span class="card-title" data-label="Worm">Worm</span>
        </a>
        <a class="series-card" href="flutter.html">
          <video class="card-preview" muted loop autoplay playsinline></video>
          <span class="card-title" data-label="Flutter">Flutter</span>
        </a>
        <a class="series-card" href="radius.html">
          <video class="card-preview" muted loop autoplay playsinline></video>
          <span class="card-title" data-label="Radius">Radius</span>
        </a>
      </nav>
    </main>

    <script>
      const series = { worm: 25, flutter: 20, radius: 25 };

      function randomClip(name) {
        const n = Math.floor(Math.random() * series[name]) + 1;
        return `gallery/${name}/${name}-${String(n).padStart(2, '0')}.mp4`;
      }

      // Load a random clip into each card on page load
      document.querySelectorAll('.series-card').forEach(card => {
        const name = card.getAttribute('href').replace('.html', '');
        card.querySelector('.card-preview').src = randomClip(name);
      });

      // Scramble titles
      const chars = '.-:_—·';
      const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

      async function scramble(element, finalText, iterations) {
        for (let i = 0; i < iterations; i++) {
          await sleep(70);
          element.textContent = finalText
            .split('')
            .map(c => c === ' ' ? ' ' : chars[Math.floor(Math.random() * chars.length)])
            .join('');
        }
        element.textContent = finalText;
      }

      document.querySelectorAll('.card-title').forEach(el => {
        window.addEventListener('load', () => scramble(el, el.dataset.label, 18));
        el.addEventListener('mouseenter', () => scramble(el, el.dataset.label, 8));
      });
    </script>
  </body>
</html>
